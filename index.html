<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GlobexoMart Admin</title>
<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js';import{getAuth,signInWithEmailAndPassword,onAuthStateChanged,signOut}from'https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js';import{getFirestore,doc,setDoc,addDoc,collection,onSnapshot,serverTimestamp,updateDoc,deleteDoc,increment,arrayUnion,query,where,getDocs}from'https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js';
const firebaseConfig={apiKey:"AIzaSyC7SjMgzuH7stBaTP-jqkHfXDLmnNJV0X8",authDomain:"globexo-d9ade.firebaseapp.com",databaseURL:"https://globexo-d9ade-default-rtdb.firebaseio.com",projectId:"globexo-d9ade",storageBucket:"globexo-d9ade.firebasestorage.app",messagingSenderId:"1009453417317",appId:"1:1009453417317:web:32538a719df79d3c6ed78c",measurementId:"G-X0QPY3ML6M"};
const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getFirestore(app);let me=null,users=[],orders=[],methods=[],withdrawals=[],community=[],payments=[],settings={adminEmails:['admin@globexomart.com'],referralPoints:20,pointPrice:0.02,supportUrl:'',vipChannelLink:''};const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];function toast(t){$('#toast').textContent=t;$('#toast').classList.add('show');setTimeout(()=>$('#toast').classList.remove('show'),2500)}function money(n){return '$'+Number(n||0).toFixed(2)}function show(id){$$('.page').forEach(p=>p.classList.remove('active'));$('#'+id)?.classList.add('active');$$('.nav button').forEach(b=>b.classList.toggle('on',b.dataset.page==id));document.querySelector('.side')?.classList.remove('open')}
function redraw(){if(!me){$('#app').innerHTML=login();return}let std=users.filter(u=>u.plan==='Standard').length,plus=users.filter(u=>u.plan==='Plus').length,pro=users.filter(u=>u.plan==='Pro').length,pending=orders.filter(o=>o.status==='pending').length;$('#app').innerHTML=`<aside class="side"><div class="brand"><img class="logoIcon" src="globexomart-learn-earn-icon.svg"><b>Admin</b></div><nav class="nav"><button class="on" data-page="dash">Dashboard</button><button data-page="orders">Orders</button><button data-page="methods">Methods</button><button data-page="payments">Payment Methods</button><button data-page="withdrawals">Withdrawals</button><button data-page="community">Community</button><button data-page="users">Users</button><button data-page="settings">Settings</button><button class="danger" onclick="signOut(auth)">Logout</button></nav></aside><header class="mobilebar"><button onclick="document.querySelector('.side').classList.toggle('open')">☰</button><div class="brand"><img class="logoIcon" src="globexomart-learn-earn-icon.svg"><b>GlobexoMart Admin</b></div></header><main class="main"><section id="dash" class="page active"><h1>Dashboard</h1><div class="grid"><div class="card stat"><small>Total Users</small><h2>${users.length}</h2></div><div class="card stat"><small>Standard</small><h2>${std}</h2></div><div class="card stat"><small>Plus</small><h2>${plus}</h2></div><div class="card stat"><small>Pro</small><h2>${pro}</h2></div><div class="card stat"><small>Pending Orders</small><h2>${pending}</h2></div></div></section><section id="orders" class="page">${ordersHtml()}</section><section id="methods" class="page">${methodsHtml()}</section><section id="payments" class="page">${paymentsHtml()}</section><section id="withdrawals" class="page">${withdrawHtml()}</section><section id="community" class="page">${communityHtml()}</section><section id="users" class="page">${usersHtml()}</section><section id="settings" class="page">${settingsHtml()}</section></main>`;$$('.nav button[data-page]').forEach(b=>b.onclick=()=>show(b.dataset.page));}
function login(){return`<main class="main" style="max-width:520px"><div class="card form"><div class="brand"><img class="logoIcon" src="globexomart-learn-earn-icon.svg"><b>Admin Login</b></div><input id="email" placeholder="Admin email"><input id="pass" type="password" placeholder="Password"><button class="primary" onclick="adminLogin()">Login</button></div></main>`}
window.adminLogin=async()=>{try{await signInWithEmailAndPassword(auth,$('#email').value,$('#pass').value)}catch(e){toast(e.message)}}
function ordersHtml(){return`<h1>Orders</h1><div class="grid">${orders.map(o=>`<div class="card"><h2>${o.type==='points'?o.points+' Points':o.planName}</h2><p>${o.userEmail}</p><p>Amount: ${money(o.amount)}</p><p>Method: ${o.paymentMethod||''}</p><p>TX: ${o.txid||''}</p><p>Status: ${o.status}</p>${o.status==='pending'?`<button class="primary" onclick="approveOrder('${o.id}')">Approve</button><button class="danger" onclick="rejectOrder('${o.id}')">Reject</button>`:''}</div>`).join('')||'<p class="muted">No orders.</p>'}</div>`}
window.approveOrder=async id=>{let o=orders.find(x=>x.id===id);if(!o)return;if(o.type==='points'){await updateDoc(doc(db,'users',o.userId),{points:increment(Number(o.points||0))});}else{let days=o.planName==='Pro'?180:o.planName==='Plus'?90:30;await updateDoc(doc(db,'users',o.userId),{plan:o.planName,planExpiry:Date.now()+days*864e5});if(o.referralCode){let qs=await getDocs(query(collection(db,'users'),where('referralCode','==',o.referralCode)));for(const d of qs.docs){if(d.id!==o.userId){await updateDoc(doc(db,'users',d.id),{points:increment(Number(settings.referralPoints||20))});await addDoc(collection(db,'earnings'),{userId:d.id,amount:Number(o.amount||0)*0.2,source:'referral',createdAt:serverTimestamp()});}}}}await updateDoc(doc(db,'orders',id),{status:'approved',approvedAt:serverTimestamp()});toast('Approved')}
window.rejectOrder=async id=>{await updateDoc(doc(db,'orders',id),{status:'rejected'});toast('Rejected')}
function methodsHtml(){return`<h1>Methods</h1><div class="card form"><input id="mtitle" placeholder="Method title"><input id="mthumb" placeholder="Thumbnail image URL"><textarea id="mdesc" placeholder="Description"></textarea><input id="mvideo" placeholder="Video URL"><input id="mdoc" placeholder="Document URL"><input id="mdrive" placeholder="Google Drive link"><input id="mvip" placeholder="VIP group/channel post link"><input id="mfree" placeholder="Free group post link"><input id="mextra" placeholder="Extra link"><label><input type="checkbox" value="Free" class="lvl"> Free</label><label><input type="checkbox" value="Standard" class="lvl"> Standard</label><label><input type="checkbox" value="Plus" class="lvl"> Plus</label><label><input type="checkbox" value="Pro" class="lvl"> Pro</label><label><input id="allowPts" type="checkbox"> Can buy with points</label><input id="mpts" type="number" placeholder="Point price for this method"><label><input id="mexp" type="checkbox"> Show expired tag</label><button class="primary" onclick="saveMethod()">Add Method</button></div><div class="methodGrid">${methods.map(m=>`<div class="card"><h2>${m.title}</h2><p>${(m.levels||[]).join(', ')}</p><p>${m.expired?'Expired':''} ${m.allowPoints?' • '+m.pointsPrice+' pts':''}</p><button class="danger" onclick="deleteDoc(doc(db,'methods','${m.id}'))">Delete</button></div>`).join('')}</div>`}
window.saveMethod=async()=>{let levels=$$('.lvl:checked').map(x=>x.value);if(!levels.length)levels=['Free'];await addDoc(collection(db,'methods'),{title:$('#mtitle').value,thumbnail:$('#mthumb').value,description:$('#mdesc').value,videoUrl:$('#mvideo').value,documentUrl:$('#mdoc').value,driveUrl:$('#mdrive').value,vipPostUrl:$('#mvip').value,freePostUrl:$('#mfree').value,extraUrl:$('#mextra').value,levels,allowPoints:$('#allowPts').checked,pointsPrice:Number($('#mpts').value||0),expired:$('#mexp').checked,createdAt:serverTimestamp()});toast('Method added')}
function paymentsHtml(){return`<h1>Payment Methods</h1><div class="card form"><input id="pname" placeholder="Method name e.g. Binance USDT"><textarea id="paddr" placeholder="Payment ID / address / account"></textarea><button class="primary" onclick="addPayment()">Add Payment Method</button></div><div class="grid">${payments.map(p=>`<div class="card"><h2>${p.name}</h2><p>${p.address}</p><button class="danger" onclick="deleteDoc(doc(db,'paymentMethods','${p.id}'))">Delete</button></div>`).join('')}</div>`}
window.addPayment=async()=>{await addDoc(collection(db,'paymentMethods'),{name:$('#pname').value,address:$('#paddr').value,active:true,createdAt:serverTimestamp()});toast('Payment method added')}
function withdrawHtml(){return`<h1>Withdrawals</h1><div class="grid">${withdrawals.map(w=>`<div class="card"><h2>${money(w.amount)}</h2><p>${w.userEmail}</p><p>${w.method}</p><p>${w.account}</p><p>Status: ${w.status}</p>${w.status==='pending'?`<button class="primary" onclick="confirmWithdraw('${w.id}')">Confirm Payment</button><button class="danger" onclick="rejectWithdraw('${w.id}')">Reject</button>`:''}</div>`).join('')||'<p class="muted">No withdrawals.</p>'}</div>`}
window.confirmWithdraw=async id=>{await updateDoc(doc(db,'withdrawals',id),{status:'paid',paidAt:serverTimestamp()});toast('Withdraw marked paid')};window.rejectWithdraw=async id=>{await updateDoc(doc(db,'withdrawals',id),{status:'rejected'});toast('Rejected')}
function communityHtml(){return`<h1>Community Links</h1><div class="card form"><input id="cname" placeholder="Site / group name"><input id="curl" placeholder="URL"><textarea id="cdesc" placeholder="Description"></textarea><button class="primary" onclick="addCommunity()">Add Link</button></div><div class="grid">${community.map(c=>`<div class="card"><h2>${c.name}</h2><p>${c.url}</p><button class="danger" onclick="deleteDoc(doc(db,'community','${c.id}'))">Delete</button></div>`).join('')}</div>`}
window.addCommunity=async()=>{await addDoc(collection(db,'community'),{name:$('#cname').value,url:$('#curl').value,description:$('#cdesc').value,createdAt:serverTimestamp()});toast('Community added')}
function usersHtml(){return`<h1>Users</h1><div class="grid">${users.map(u=>`<div class="card"><h2>${u.name||'User'}</h2><p>${u.email}</p><p>Plan: ${u.plan||'Basic'}</p><p>Points: ${u.points||0}</p></div>`).join('')}</div>`}
function settingsHtml(){return`<h1>Settings</h1><div class="card form"><input id="rpts" type="number" value="${settings.referralPoints||20}" placeholder="Points per referral"><input id="ptprice" type="number" step="0.001" value="${settings.pointPrice||0.02}" placeholder="Price per point"><input id="support" value="${settings.supportUrl||''}" placeholder="Support URL or @username"><input id="vip" value="${settings.vipChannelLink||''}" placeholder="VIP channel link"><button class="primary" onclick="saveSettings()">Save Settings</button></div>`}
window.saveSettings=async()=>{await setDoc(doc(db,'settings','main'),{referralPoints:Number($('#rpts').value||20),pointPrice:Number($('#ptprice').value||0.02),supportUrl:$('#support').value,vipChannelLink:$('#vip').value},{merge:true});toast('Settings saved')}
onAuthStateChanged(auth,u=>{me=u;if(!u){redraw();return}onSnapshot(collection(db,'users'),s=>{users=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(collection(db,'orders'),s=>{orders=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(collection(db,'methods'),s=>{methods=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(collection(db,'withdrawals'),s=>{withdrawals=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(collection(db,'community'),s=>{community=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(collection(db,'paymentMethods'),s=>{payments=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(doc(db,'settings','main'),s=>{settings={...settings,...(s.data()||{})};redraw()})});
</script><style>*{box-sizing:border-box}body{margin:0;background:#06111e;color:#f8fbff;font-family:Inter,system-ui,Arial;overflow-x:hidden}button,.btn{border:0;border-radius:18px;padding:14px 20px;background:#142740;color:#fff;font-weight:900;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px;cursor:pointer}button:hover,.btn:hover{filter:brightness(1.1)}.primary{background:linear-gradient(135deg,#55e6ac,#55b8ff);color:#07111f}.danger{background:#2a0718;border:1px solid #ff5f8d;color:#ff7e9e}.top{position:sticky;top:0;z-index:20;background:#081424e8;backdrop-filter:blur(12px);border-bottom:1px solid #244063;padding:18px 6%;display:flex;align-items:center;justify-content:space-between}.brand{display:flex;align-items:center;gap:14px;font-size:28px;font-weight:950;white-space:nowrap}.logoIcon{width:64px;height:64px;object-fit:contain}.hero{padding:70px 6%;text-align:center;background:radial-gradient(circle at 50% 0,#164d7b88,transparent 45%)}.hero span{display:inline-block;background:#0d493f;border-radius:40px;padding:12px 24px;color:#62f0b0;font-weight:900}.hero h1{font-size:clamp(42px,8vw,78px);line-height:1.06;margin:28px 0 18px}.grad{background:linear-gradient(135deg,#5bf0af,#58baff);-webkit-background-clip:text;color:transparent}.muted{color:#a9b9cd;font-size:clamp(18px,3.7vw,24px);line-height:1.5}.heroBtns{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-top:28px}.layout{display:grid;grid-template-columns:290px 1fr;min-height:100vh}.side{position:sticky;top:0;height:100vh;padding:22px;background:#081424;border-right:1px solid #223a5d;display:flex;flex-direction:column;gap:18px}.nav{display:grid;gap:11px}.nav button{justify-content:flex-start}.nav button.on{background:linear-gradient(135deg,#55e6ac,#55b8ff);color:#06111e}.main{padding:42px;max-width:1180px;width:100%;margin:auto}.mobilebar{display:none}.page{display:none}.page.active{display:block}h1{font-size:clamp(36px,7vw,62px);margin:0 0 20px}h2{font-size:32px;margin:10px 0}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:22px}.card{background:linear-gradient(160deg,#102642,#071829);border:1px solid #29466c;border-radius:28px;padding:28px;box-shadow:0 20px 60px #0005}.stat{min-height:160px}.stat h2{font-size:48px}.chart{height:180px;background:linear-gradient(180deg,#0d2848,#071829);border:1px solid #29466c;border-radius:28px;padding:18px;display:flex;align-items:end;gap:10px}.bar{flex:1;border-radius:12px 12px 0 0;background:linear-gradient(180deg,#55e6ac,#55b8ff)}.methodTabs{display:flex;gap:10px;overflow:auto;padding-bottom:8px;margin:16px 0}.methodTabs button{min-width:max-content}.methodGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px}.method{overflow:hidden;padding:0}.thumb{height:160px;background:#102642;display:flex;align-items:center;justify-content:center;font-size:50px}.thumb img{width:100%;height:100%;object-fit:cover}.methodBody{padding:22px}.tag{display:inline-flex;margin:4px 5px 4px 0;padding:7px 11px;border-radius:99px;background:#17365a;color:#bde0ff;font-size:13px;font-weight:800}.free{background:#0d493f;color:#62f0b0}.expired{background:#492031;color:#ff8fab}.points{background:#4a3c0d;color:#ffd66b}.modal{display:none;position:fixed;inset:0;background:#000b;z-index:99;align-items:center;justify-content:center;padding:18px}.modal.show{display:flex}.box{max-width:560px;width:100%;max-height:90vh;overflow:auto;background:#0b192b;border:1px solid #29466c;border-radius:28px;padding:24px}.x{float:right}.form{display:grid;gap:12px}.form input,.form textarea,.form select,input,textarea,select{width:100%;padding:15px;border-radius:16px;border:1px solid #29466c;background:#06111e;color:#fff;margin:6px 0}.linkCard{text-decoration:none;color:#fff}#toast{position:fixed;left:50%;bottom:25px;transform:translateX(-50%);background:#111b2a;padding:14px 20px;border-radius:16px;display:none;z-index:120}#toast.show{display:block}@media(max-width:800px){.layout{display:block}.side{position:fixed;left:-310px;top:0;z-index:50;width:300px;transition:.25s}.side.open{left:0}.mobilebar{display:flex;position:sticky;top:0;z-index:30;align-items:center;gap:12px;padding:16px;background:#081424;border-bottom:1px solid #223a5d}.main{padding:34px 18px}.top{padding:16px 18px}.brand{font-size:24px}.logoIcon{width:56px;height:56px}.hero{padding:54px 18px}.heroBtns{display:grid}.grid{grid-template-columns:1fr}.methodGrid{grid-template-columns:1fr}</style></head><body><div id="app"></div><div id="toast"></div></body></html>
