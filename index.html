<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GlobexoMart Admin</title><script type="module">

const firebaseConfig={apiKey:"AIzaSyC7SjMgzuH7stBaTP-jqkHfXDLmnNJV0X8",authDomain:"globexo-d9ade.firebaseapp.com",databaseURL:"https://globexo-d9ade-default-rtdb.firebaseio.com",projectId:"globexo-d9ade",storageBucket:"globexo-d9ade.firebasestorage.app",messagingSenderId:"1009453417317",appId:"1:1009453417317:web:32538a719df79d3c6ed78c",measurementId:"G-X0QPY3ML6M"};
const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getFirestore(app);window.auth=auth;window.db=db;window.doc=doc;window.deleteDoc=deleteDoc;window.signOut=signOut;
let me=null,users=[],orders=[],methods=[],products=[],withdrawals=[],community=[],payments=[],plans=[],coupons=[],supportMessages=[],notifications=[],pointRedeems=[],settings={adminEmails:['admin@globexomart.com'],freeReferralPoints:20,paidReferralPercent:20,referralPoints:20,pointPrice:0.02,pointsRedeemEnabled:true,supportUrl:'',vipChannelLink:''};
const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];function toast(t){let el=$('#toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500)}function money(n){return '$'+Number(n||0).toFixed(2)}function show(id){$$('.page').forEach(p=>p.classList.remove('active'));$('#'+id)?.classList.add('active');$$('.nav button').forEach(b=>b.classList.toggle('on',b.dataset.page==id));document.querySelector('.side')?.classList.remove('open')}

function sortTop(list){return [...list].sort((a,b)=>(Number(b.onTop||0)-Number(a.onTop||0))||(Number(a.topOrder||999)-Number(b.topOrder||999))||((b.createdAt?.seconds||0)-(a.createdAt?.seconds||0)))}
function orderTime(o){let t=o.approvedAt||o.createdAt;if(!t)return 0;if(typeof t.toMillis==='function')return t.toMillis();if(t.seconds)return t.seconds*1000;if(typeof t==='number')return t;return Date.parse(t)||0}
function salesStats(){let now=Date.now(),day=864e5,month=30*day,year=365*day;let base={day:0,month:0,year:0,total:0,count:0};let product={...base},subs={...base},points={...base},combined={...base};orders.filter(o=>o.status==='approved').forEach(o=>{let amt=Number(o.amount||0),t=orderTime(o),bucket=o.type==='product'?product:(o.type==='points'?points:subs);[bucket,combined].forEach(b=>{b.total+=amt;b.count++;if(now-t<=day)b.day+=amt;if(now-t<=month)b.month+=amt;if(now-t<=year)b.year+=amt})});return{product,subs,points,combined}}
function statCards(title,s){return `<h2>${title}</h2><div class="grid"><div class="card stat income"><small>Daily Income</small><h2>${money(s.day)}</h2></div><div class="card stat income"><small>Monthly Income</small><h2>${money(s.month)}</h2></div><div class="card stat income"><small>Yearly Income</small><h2>${money(s.year)}</h2></div><div class="card stat income"><small>All Time Income</small><h2>${money(s.total)}</h2><small>${s.count} approved sales</small></div></div>`}
function dashboardHtml(std,plus,pro,premium,pending){let st=salesStats();return `<section id="dash" class="page active"><h1>Dashboard</h1><div class="grid"><div class="card stat"><small>Total Users</small><h2>${users.length}</h2></div><div class="card stat"><small>Users With Plans</small><h2>${premium}</h2></div><div class="card stat"><small>Standard</small><h2>${std}</h2></div><div class="card stat"><small>Plus</small><h2>${plus}</h2></div><div class="card stat"><small>Pro</small><h2>${pro}</h2></div><div class="card stat"><small>Pending Orders</small><h2>${pending}</h2></div><div class="card stat"><small>Products</small><h2>${products.length}</h2></div><div class="card stat"><small>Methods Uploaded</small><h2>${methods.length}</h2></div><div class="card stat"><small>Payment Methods</small><h2>${payments.length}</h2></div><div class="card stat"><small>Coupons</small><h2>${coupons.length}</h2></div></div>${statCards('Combined Income',st.combined)}${statCards('Subscription Income',st.subs)}${statCards('Product Income',st.product)}${statCards('Points Income',st.points)}<div class="card"><h2>Income Overview</h2><div class="chart"><div class="bar" style="height:${Math.max(8,Math.min(100,st.combined.day/(st.combined.total||1)*100))}%"></div><div class="bar" style="height:${Math.max(12,Math.min(100,st.combined.month/(st.combined.total||1)*100))}%"></div><div class="bar" style="height:${Math.max(18,Math.min(100,st.combined.year/(st.combined.total||1)*100))}%"></div><div class="bar" style="height:100%"></div></div><p class="muted">Daily • Monthly • Yearly • All time</p></div></section>`}

function redraw(){if(!me){$('#app').innerHTML=login();return}let std=users.filter(u=>u.plan==='Standard').length,plus=users.filter(u=>u.plan==='Plus').length,pro=users.filter(u=>u.plan==='Pro').length,premium=std+plus+pro,pending=orders.filter(o=>o.status==='pending').length;$('#app').innerHTML=`<aside class="side"><div class="brand"><img class="logoIcon" src="globexomart-learn-earn-icon.svg"><b>Admin</b></div><nav class="nav"><button class="on" data-page="dash">Dashboard</button><button data-page="plans">Plans</button><button data-page="coupons">Coupons</button><button data-page="orders">Orders</button><button data-page="methods">Methods</button><button data-page="products">Products</button><button data-page="payments">Payment Methods</button><button data-page="withdrawals">Withdrawals</button><button data-page="pointRedeems">Points Redeem</button><button data-page="community">Community</button><button data-page="support">Support Chat</button><button data-page="notifications">Notifications</button><button data-page="users">Users</button><button data-page="settings">Settings</button><button class="danger" onclick="signOut(auth)">Logout</button></nav></aside><header class="mobilebar"><button onclick="document.querySelector('.side').classList.toggle('open')">☰</button><div class="brand"><img class="logoIcon" src="globexomart-learn-earn-icon.svg"><b>GlobexoMart Admin</b></div></header><main class="main">${dashboardHtml(std,plus,pro,premium,pending)}<section id="plans" class="page">${plansHtml()}</section><section id="coupons" class="page">${couponsHtml()}</section><section id="orders" class="page">${ordersHtml()}</section><section id="methods" class="page">${methodsHtml()}</section><section id="products" class="page">${productsHtml()}</section><section id="payments" class="page">${paymentsHtml()}</section><section id="withdrawals" class="page">${withdrawHtml()}</section><section id="pointRedeems" class="page">${pointRedeemsHtml()}</section><section id="community" class="page">${communityHtml()}</section><section id="support" class="page">${supportHtml()}</section><section id="notifications" class="page">${notificationsHtml()}</section><section id="users" class="page">${usersHtml()}</section><section id="settings" class="page">${settingsHtml()}</section></main>`;$$('.nav button[data-page]').forEach(b=>b.onclick=()=>show(b.dataset.page))}
function login(){return`<main class="main" style="max-width:520px"><div class="card form"><div class="brand"><img class="logoIcon" src="globexomart-learn-earn-icon.svg"><b>Admin Login</b></div><input id="email" placeholder="Admin email"><input id="pass" type="password" placeholder="Password"><button class="primary" onclick="adminLogin()">Login</button></div></main>`}
window.adminLogin=async()=>{try{await signInWithEmailAndPassword(auth,$('#email').value,$('#pass').value)}catch(e){toast(e.message)}}
function plansHtml(){return`<h1>Plans</h1><button class="primary" onclick="seedPlans()">Create Default Plans</button><p class="muted">Default: Standard 1 month $20, Plus 6 months $30, Pro lifetime $50. You can edit price, duration, discount, and benefits anytime.</p><div class="card form"><input id="plId" type="hidden"><input id="plName" placeholder="Plan name: Standard / Plus / Pro"><input id="plPrice" type="number" step="0.01" placeholder="Price"><input id="plDiscount" type="number" placeholder="Discount percentage optional"><input id="plDays" type="number" placeholder="Duration days (36500 = lifetime)"><textarea id="plDesc" placeholder="Benefits / description"></textarea><button class="primary" onclick="savePlan()">Save Plan</button></div><div class="grid">${plans.map(p=>`<div class="card"><h2>${p.name}</h2><h1>${money(p.price)}</h1><p>Duration: ${Number(p.durationDays)>10000?'Lifetime':(p.durationDays||30)+' days'}</p><p>Discount: ${p.discount||0}%</p><p>${p.description||''}</p><div class="row"><button onclick="editPlan('${p.id}')">Edit</button><button class="danger" onclick="removeItem('plans','${p.id}')">Delete</button></div></div>`).join('')||'<p class="muted">No plans yet. Click Create Default Plans.</p>'}</div>`}
window.editPlan=id=>{let p=plans.find(x=>x.id===id);if(!p)return;$('#plId').value=id;$('#plName').value=p.name||'';$('#plPrice').value=p.price||'';$('#plDiscount').value=p.discount||'';$('#plDays').value=p.durationDays||'';$('#plDesc').value=p.description||'';toast('Plan loaded for edit')}
window.seedPlans=async()=>{let defs=[['Standard',20,30,'1 month access to Standard methods and VIP channel.'],['Plus',30,180,'6 months access to Standard and Plus methods with VIP channel.'],['Pro',50,36500,'Lifetime access to all Standard, Plus and Pro methods.']];for(let d of defs){await setDoc(doc(db,'plans',d[0].toLowerCase()),{name:d[0],price:d[1],durationDays:d[2],discount:0,description:d[3],updatedAt:serverTimestamp()},{merge:true})}toast('Default plans created')};
window.savePlan=async()=>{let data={name:$('#plName').value,price:Number($('#plPrice').value||0),discount:Number($('#plDiscount').value||0),durationDays:Number($('#plDays').value||30),description:$('#plDesc').value,updatedAt:serverTimestamp()};let id=$('#plId').value;if(id)await setDoc(doc(db,'plans',id),data,{merge:true});else await addDoc(collection(db,'plans'),{...data,createdAt:serverTimestamp()});toast('Plan saved')}
function couponsHtml(){return`<h1>Coupons</h1><div class="card form"><input id="cpId" type="hidden"><input id="cpCode" placeholder="Coupon code"><select id="cpType"><option value="percent">Percent discount</option><option value="fixed">Fixed amount</option></select><input id="cpValue" type="number" step="0.01" placeholder="Discount value"><select id="cpTarget"><option value="all">All</option><option value="plan">Plans only</option><option value="points">Points only</option></select><select id="cpUse"><option value="single">Single use</option><option value="multiple">Multiple use</option></select><input id="cpMax" type="number" placeholder="Max uses for multiple use"><input id="cpExpire" type="datetime-local" placeholder="Expire time optional"><label><input id="cpActive" type="checkbox" checked> Active</label><button class="primary" onclick="saveCoupon()">Save Coupon</button></div><div class="grid">${coupons.map(c=>`<div class="card"><h2>${c.code}</h2><p>${c.type==='fixed'?money(c.value):c.value+'%'} • ${c.target||'all'}</p><p>Uses: ${c.usedCount||0}/${c.maxUses||'∞'}</p><p>${c.expiresAt?'Expires: '+new Date(Number(c.expiresAt)).toLocaleString():'No expiry'}</p><p>Status: ${c.active===false?'Disabled':'Active'}</p><div class="row"><button onclick="editCoupon('${c.id}')">Edit</button><button class="danger" onclick="removeItem('coupons','${c.id}')">Delete</button></div></div>`).join('')||'<p class="muted">No coupons yet.</p>'}</div>`}
window.editCoupon=id=>{let c=coupons.find(x=>x.id===id);if(!c)return;$('#cpId').value=id;$('#cpCode').value=c.code||'';$('#cpType').value=c.type||'percent';$('#cpValue').value=c.value||'';$('#cpTarget').value=c.target||'all';$('#cpUse').value=c.maxUses==1?'single':'multiple';$('#cpMax').value=c.maxUses||'';$('#cpActive').checked=c.active!==false;if(c.expiresAt){let d=new Date(Number(c.expiresAt));$('#cpExpire').value=d.toISOString().slice(0,16)}toast('Coupon loaded for edit')}
window.saveCoupon=async()=>{let max=$('#cpUse').value==='single'?1:Number($('#cpMax').value||0)||null,exp=$('#cpExpire').value?new Date($('#cpExpire').value).getTime():null;let data={code:$('#cpCode').value.trim().toUpperCase(),type:$('#cpType').value,value:Number($('#cpValue').value||0),target:$('#cpTarget').value,maxUses:max,expiresAt:exp,active:$('#cpActive').checked,updatedAt:serverTimestamp()};let id=$('#cpId').value;if(id)await setDoc(doc(db,'coupons',id),data,{merge:true});else await addDoc(collection(db,'coupons'),{...data,usedCount:0,createdAt:serverTimestamp()});toast('Coupon saved')}
function ordersHtml(){return`<h1>Orders</h1><div class="grid">${orders.map(o=>`<div class="card"><h2>${o.type==='points'?(o.points+' Points'):(o.type==='product'?o.productTitle:(o.planName||'Order'))}</h2><p>${o.userEmail}</p><p>Amount: ${money(o.amount)} ${o.originalAmount?`<span class="muted">from ${money(o.originalAmount)}</span>`:''}</p><p>Coupon: ${o.couponCode||'None'}</p><p>Method: ${o.paymentMethod||''}</p><p>TX: ${o.txid||''}</p><p>Proof: ${o.proof||''}</p><p>Status: ${o.status}</p>${o.status==='pending'?`<button class="primary" onclick="approveOrder('${o.id}')">Approve</button><button class="danger" onclick="rejectOrder('${o.id}')">Reject</button>`:''}</div>`).join('')||'<p class="muted">No orders.</p>'}</div>`}
window.approveOrder=async id=>{let o=orders.find(x=>x.id===id);if(!o)return;if(o.type==='points'){await updateDoc(doc(db,'users',o.userId),{points:increment(Number(o.points||0))});await addDoc(collection(db,'notifications'),{userId:o.userId,title:'Points approved',message:`${o.points} Points added to your account.`,createdAt:serverTimestamp()})}else if(o.type==='product'){await addDoc(collection(db,'notifications'),{userId:o.userId,title:'Product approved',message:`Your ${o.productTitle||'product'} order is approved. Delivery is available in Products.`,createdAt:serverTimestamp()})}else{let p=plans.find(x=>x.id===o.planId)||{},days=Number(p.durationDays|| (o.planName==='Pro'?36500:o.planName==='Plus'?180:30));await updateDoc(doc(db,'users',o.userId),{plan:o.planName,planExpiry:Date.now()+days*864e5});await addDoc(collection(db,'notifications'),{userId:o.userId,title:o.isUpgrade?'Plan upgraded':'Plan approved',message:`Your ${o.planName} plan is now active.`,createdAt:serverTimestamp()});if(o.referralCode){let qs=await getDocs(query(collection(db,'users'),where('referralCode','==',o.referralCode)));qs.forEach(async d=>{if(d.id!==o.userId){let pct=Number(settings.paidReferralPercent||20),amt=Number(o.amount||0)*pct/100;await updateDoc(doc(db,'users',d.id),{referralUsdt:increment(amt)});await addDoc(collection(db,'earnings'),{userId:d.id,amount:amt,source:'paid_plan_referral',orderId:id,percent:pct,buyerEmail:o.userEmail,createdAt:serverTimestamp()});await addDoc(collection(db,'notifications'),{userId:d.id,title:'Referral earning',message:`You earned ${money(amt)} from a paid referral.`,createdAt:serverTimestamp()})}})}}if(o.couponCode){let qs=await getDocs(query(collection(db,'coupons'),where('code','==',o.couponCode)));qs.forEach(async d=>await updateDoc(doc(db,'coupons',d.id),{usedCount:increment(1)}))}await updateDoc(doc(db,'orders',id),{status:'approved',approvedAt:serverTimestamp()});toast('Approved')}
window.rejectOrder=async id=>{await updateDoc(doc(db,'orders',id),{status:'rejected'});toast('Rejected')}
function methodsHtml(){let ordered=sortTop(methods);return`<h1>Methods</h1><p class="muted">Use On Top + order number to place a method in front of all methods. Credit % with link is shown as a badge on user side.</p><div class="card form"><input id="mId" type="hidden"><input id="mtitle" placeholder="Method title"><input id="mthumb" placeholder="Thumbnail image URL"><textarea id="mdesc" placeholder="Description"></textarea><input id="mvideo" placeholder="Video URL"><input id="mdoc" placeholder="Document URL"><input id="mdrive" placeholder="Google Drive link"><input id="mvip" placeholder="VIP group/channel post link"><input id="mfree" placeholder="Free group post link"><input id="mextra" placeholder="Extra link"><div class="row"><label><input type="checkbox" value="Free" class="lvl"> Free</label><label><input type="checkbox" value="Standard" class="lvl"> Standard</label><label><input type="checkbox" value="Plus" class="lvl"> Plus</label><label><input type="checkbox" value="Pro" class="lvl"> Pro</label></div><label><input id="allowPts" type="checkbox"> Can buy with Points</label><input id="mpts" type="number" placeholder="Points price"><label><input id="mexp" type="checkbox"> Show expired tag</label><label><input id="monTop" type="checkbox"> Put on top/front</label><input id="morder" type="number" placeholder="Top order number, smaller shows first"><input id="mcredit" type="number" placeholder="Credit percentage badge e.g. 20"><input id="mcreditLink" placeholder="Credit link optional"><button class="primary" onclick="saveMethod()">Save Method</button></div><h2>All Methods List</h2><div class="methodGrid">${ordered.map(m=>`<div class="card method"><div class="thumb">${m.thumbnail?`<img src="${m.thumbnail}" onerror="this.parentElement.innerHTML='📘'">`:'📘'}</div><div class="methodBody"><h2>${m.title}</h2><p>${m.description||''}</p><p>${m.onTop?'<span class="tag free">On Top</span>':''}${m.creditPercent?`<span class="tag points">${m.creditPercent}% credit</span>`:''}${(m.levels||[]).map(l=>`<span class="tag ${l==='Free'?'free':''}">${l}</span>`).join('')} ${m.allowPoints?`<span class="tag points">${m.pointsPrice||0} Points</span>`:''} ${m.expired?'<span class="tag expired">Expired</span>':''}</p><p class="muted">Video, document, Google Drive, VIP/free post, and extra links supported.</p><div class="row"><button onclick="editMethod('${m.id}')">Edit</button><button class="danger" onclick="removeItem('methods','${m.id}')">Delete</button></div></div></div>`).join('')||'<p class="muted">No methods yet.</p>'}</div>`}
window.editMethod=id=>{let m=methods.find(x=>x.id===id);if(!m)return;$('#mId').value=id;$('#mtitle').value=m.title||'';$('#mthumb').value=m.thumbnail||'';$('#mdesc').value=m.description||'';$('#mvideo').value=m.videoUrl||'';$('#mdoc').value=m.documentUrl||'';$('#mdrive').value=m.driveUrl||'';$('#mvip').value=m.vipPostUrl||'';$('#mfree').value=m.freePostUrl||'';$('#mextra').value=m.extraUrl||'';$$('.lvl').forEach(x=>x.checked=(m.levels||[]).includes(x.value));$('#allowPts').checked=!!m.allowPoints;$('#mpts').value=m.pointsPrice||'';$('#mexp').checked=!!m.expired;$('#monTop').checked=!!m.onTop;$('#morder').value=m.topOrder||'';$('#mcredit').value=m.creditPercent||'';$('#mcreditLink').value=m.creditLink||'';toast('Method loaded for edit')}
window.saveMethod=async()=>{let levels=$$('.lvl').filter(x=>x.checked).map(x=>x.value);let data={title:$('#mtitle').value,thumbnail:$('#mthumb').value,description:$('#mdesc').value,videoUrl:$('#mvideo').value,documentUrl:$('#mdoc').value,driveUrl:$('#mdrive').value,vipPostUrl:$('#mvip').value,freePostUrl:$('#mfree').value,extraUrl:$('#mextra').value,levels,allowPoints:$('#allowPts').checked,pointsPrice:Number($('#mpts').value||0),expired:$('#mexp').checked,onTop:$('#monTop').checked,topOrder:Number($('#morder').value||999),creditPercent:Number($('#mcredit').value||0),creditLink:$('#mcreditLink').value,updatedAt:serverTimestamp()};let id=$('#mId').value;if(id)await setDoc(doc(db,'methods',id),data,{merge:true});else await addDoc(collection(db,'methods'),{...data,createdAt:serverTimestamp()});toast('Method saved')}

function productsHtml(){let ordered=sortTop(products);return`<h1>Products</h1><p class="muted">Add digital products. Users pay, admin approves, then delivery text/link is shown to the user. Use On Top to feature products first.</p><div class="card form"><input id="prId" type="hidden"><input id="prTitle" placeholder="Product title"><input id="prThumb" placeholder="Thumbnail image URL"><input id="prPrice" type="number" step="0.01" placeholder="Price"><input id="prDiscount" type="number" placeholder="Discount % optional"><input id="prBulkQty" type="number" placeholder="Bulk quantity e.g. 5"><input id="prBulkDiscount" type="number" placeholder="Bulk discount %"><textarea id="prDetails" placeholder="Product details"></textarea><textarea id="prDeliveryText" placeholder="Delivery text / account / code / instructions"></textarea><input id="prDeliveryLink" placeholder="Delivery link optional"><label><input id="pronTop" type="checkbox"> Put on top/front</label><input id="prOrder" type="number" placeholder="Top order number, smaller shows first"><input id="prCredit" type="number" placeholder="Credit percentage badge e.g. 20"><input id="prCreditLink" placeholder="Credit link optional"><button class="primary" onclick="saveProduct()">Save Product</button></div><div class="card form" style="margin-top:22px"><h2>Bulk Add Products</h2><p class="muted">Add one product per line. Use this format:<br><b>Title | Price | Thumbnail URL | Details | Delivery text | Delivery link</b><br>Blank lines are ignored, so you can leave a gap between products.</p><textarea id="bulkProducts" rows="8" placeholder="Netflix 1M | 5 | https://image.com/netflix.jpg | Premium account | email:pass details | https://drive.google.com/...\nPrime Video 6M | 8 | https://image.com/prime.jpg | Global account | account details |"></textarea><label><input id="bulkOnTop" type="checkbox"> Put bulk products on top/front</label><input id="bulkCredit" type="number" placeholder="Credit percentage badge for all optional"><input id="bulkCreditLink" placeholder="Credit link for all optional"><button class="primary" onclick="saveBulkProducts()">Add Bulk Products</button></div><div class="grid">${ordered.map(p=>`<div class="card method"><div class="thumb">${p.thumbnail?`<img src="${p.thumbnail}" onerror="this.parentElement.innerHTML='🛍️'">`:'🛍️'}</div><div class="methodBody"><h2>${p.title}</h2><p>${p.onTop?'<span class="tag free">On Top</span>':''}${p.creditPercent?`<span class="tag points">${p.creditPercent}% credit</span>`:''}</p><p>${money(p.price)} ${p.discount?`• ${p.discount}% off`:''}</p><p>${p.details||''}</p><p>${p.bulkQty?`Bulk: ${p.bulkQty}+ saves ${p.bulkDiscount||0}%`:''}</p><div class="row"><button onclick="editProduct('${p.id}')">Edit</button><button class="danger" onclick="removeItem('products','${p.id}')">Delete</button></div></div></div>`).join('')||'<p class="muted">No products yet.</p>'}</div>`}
window.editProduct=id=>{let p=products.find(x=>x.id===id);if(!p)return;$('#prId').value=id;$('#prTitle').value=p.title||'';$('#prThumb').value=p.thumbnail||'';$('#prPrice').value=p.price||'';$('#prDiscount').value=p.discount||'';$('#prBulkQty').value=p.bulkQty||'';$('#prBulkDiscount').value=p.bulkDiscount||'';$('#prDetails').value=p.details||'';$('#prDeliveryText').value=p.deliveryText||'';$('#prDeliveryLink').value=p.deliveryLink||'';$('#pronTop').checked=!!p.onTop;$('#prOrder').value=p.topOrder||'';$('#prCredit').value=p.creditPercent||'';$('#prCreditLink').value=p.creditLink||'';toast('Product loaded for edit')}

window.saveBulkProducts=async()=>{let raw=$('#bulkProducts')?.value||'';let lines=raw.split(/
+/).map(x=>x.trim()).filter(Boolean);if(!lines.length)return toast('Add product lines');let count=0;for(let line of lines){let parts=line.split('|').map(x=>x.trim());let [title,price,thumbnail,details,deliveryText,deliveryLink]=parts;if(!title||!price){continue}await addDoc(collection(db,'products'),{title,price:Number(price||0),thumbnail:thumbnail||'',details:details||'',deliveryText:deliveryText||'',deliveryLink:deliveryLink||'',discount:0,bulkQty:0,bulkDiscount:0,onTop:$('#bulkOnTop')?.checked||false,topOrder:999,creditPercent:Number($('#bulkCredit')?.value||0),creditLink:$('#bulkCreditLink')?.value||'',createdAt:serverTimestamp(),updatedAt:serverTimestamp()});count++}$('#bulkProducts').value='';toast(count+' products added')}
window.saveProduct=async()=>{let data={title:$('#prTitle').value,thumbnail:$('#prThumb').value,price:Number($('#prPrice').value||0),discount:Number($('#prDiscount').value||0),bulkQty:Number($('#prBulkQty').value||0),bulkDiscount:Number($('#prBulkDiscount').value||0),details:$('#prDetails').value,deliveryText:$('#prDeliveryText').value,deliveryLink:$('#prDeliveryLink').value,onTop:$('#pronTop').checked,topOrder:Number($('#prOrder').value||999),creditPercent:Number($('#prCredit').value||0),creditLink:$('#prCreditLink').value,updatedAt:serverTimestamp()};let id=$('#prId').value;if(id)await setDoc(doc(db,'products',id),data,{merge:true});else await addDoc(collection(db,'products'),{...data,createdAt:serverTimestamp()});toast('Product saved')}

function paymentsHtml(){return`<h1>Payment Methods</h1><div class="card form"><input id="payId" type="hidden"><input id="pname" placeholder="Method name e.g. Binance USDT"><textarea id="paddr" placeholder="Payment ID / address / account"></textarea><button class="primary" onclick="savePayment()">Save Payment Method</button></div><div class="grid">${payments.map(p=>`<div class="card"><h2>${p.name}</h2><p>${p.address}</p><div class="row"><button onclick="editPayment('${p.id}')">Edit</button><button class="danger" onclick="removeItem('paymentMethods','${p.id}')">Delete</button></div></div>`).join('')||'<p class="muted">No payment methods.</p>'}</div>`}
window.editPayment=id=>{let p=payments.find(x=>x.id===id);if(!p)return;$('#payId').value=id;$('#pname').value=p.name||'';$('#paddr').value=p.address||'';toast('Payment method loaded for edit')}
window.savePayment=async()=>{let data={name:$('#pname').value,address:$('#paddr').value,active:true,updatedAt:serverTimestamp()};let id=$('#payId').value;if(id)await setDoc(doc(db,'paymentMethods',id),data,{merge:true});else await addDoc(collection(db,'paymentMethods'),{...data,createdAt:serverTimestamp()});toast('Payment method saved')}
window.addPayment=window.savePayment


function pointRedeemsHtml(){return`<h1>Points Redeem Requests</h1><p class="muted">Every method unlock with Points requires admin approval. You can turn this system on/off in Settings.</p><div class="grid"><div class="card stat"><small>System Status</small><h2>${settings.pointsRedeemEnabled===false?'OFF':'ON'}</h2></div><div class="card stat"><small>Pending Redeems</small><h2>${pointRedeems.filter(r=>r.status==='pending').length}</h2></div></div><div class="grid">${pointRedeems.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0)).map(r=>`<div class="card"><h2>${r.methodTitle||'Method'}</h2><p><b>User:</b> ${r.userEmail||''}</p><p><b>Points:</b> ${r.pointsPrice||0}</p><p><b>Status:</b> ${r.status||'pending'}</p>${r.status==='pending'?`<div class="row"><button class="primary" onclick="approvePointRedeem('${r.id}')">Approve Redeem</button><button class="danger" onclick="rejectPointRedeem('${r.id}')">Reject</button></div>`:''}</div>`).join('')||'<p class="muted">No redeem requests yet.</p>'}</div>`}
window.approvePointRedeem=async id=>{let r=pointRedeems.find(x=>x.id===id);if(!r)return;let u=users.find(x=>x.id===r.userId)||{};let cost=Number(r.pointsPrice||0);if(Number(u.points||0)<cost)return toast('User has not enough Points now');await updateDoc(doc(db,'users',r.userId),{points:increment(-cost),purchasedMethods:arrayUnion(r.methodId)});await updateDoc(doc(db,'pointRedeems',id),{status:'approved',approvedAt:serverTimestamp()});await addDoc(collection(db,'notifications'),{userId:r.userId,title:'Method unlocked',message:`${r.methodTitle||'Method'} approved and unlocked with Points.`,createdAt:serverTimestamp()});toast('Redeem approved')}
window.rejectPointRedeem=async id=>{let r=pointRedeems.find(x=>x.id===id);await updateDoc(doc(db,'pointRedeems',id),{status:'rejected',rejectedAt:serverTimestamp()});if(r?.userId)await addDoc(collection(db,'notifications'),{userId:r.userId,title:'Points redeem rejected',message:`Your request for ${r.methodTitle||'method'} was rejected.`,createdAt:serverTimestamp()});toast('Redeem rejected')}

function withdrawHtml(){return`<h1>Withdrawals</h1><div class="grid">${withdrawals.map(w=>`<div class="card"><h2>${money(w.amount)}</h2><p>${w.userEmail}</p><p>${w.method}</p><p>${w.account}</p><p>Status: ${w.status}</p>${w.status==='pending'?`<button class="primary" onclick="confirmWithdraw('${w.id}')">Confirm Payment</button><button class="danger" onclick="rejectWithdraw('${w.id}')">Reject</button>`:''}</div>`).join('')||'<p class="muted">No withdrawals.</p>'}</div>`}
window.confirmWithdraw=async id=>{await updateDoc(doc(db,'withdrawals',id),{status:'paid',paidAt:serverTimestamp()});toast('Withdraw marked paid')};window.rejectWithdraw=async id=>{await updateDoc(doc(db,'withdrawals',id),{status:'rejected'});toast('Rejected')}
function communityHtml(){return`<h1>Community Links</h1><div class="card form"><input id="comId" type="hidden"><input id="cname" placeholder="Site / group name"><input id="curl" placeholder="URL"><textarea id="cdesc" placeholder="Description"></textarea><button class="primary" onclick="saveCommunity()">Save Link</button></div><div class="grid">${community.map(c=>`<div class="card"><h2>${c.name}</h2><p>${c.url}</p><p>${c.description||''}</p><div class="row"><button onclick="editCommunity('${c.id}')">Edit</button><button class="danger" onclick="removeItem('community','${c.id}')">Delete</button></div></div>`).join('')||'<p class="muted">No links.</p>'}</div>`}
window.editCommunity=id=>{let c=community.find(x=>x.id===id);if(!c)return;$('#comId').value=id;$('#cname').value=c.name||'';$('#curl').value=c.url||'';$('#cdesc').value=c.description||'';toast('Community link loaded for edit')}
window.saveCommunity=async()=>{let data={name:$('#cname').value,url:$('#curl').value,description:$('#cdesc').value,updatedAt:serverTimestamp()};let id=$('#comId').value;if(id)await setDoc(doc(db,'community',id),data,{merge:true});else await addDoc(collection(db,'community'),{...data,createdAt:serverTimestamp()});toast('Community saved')}
window.addCommunity=window.saveCommunity

function supportHtml(){return`<h1>Support Chat</h1><p class="muted">Read user messages and reply from here.</p><div class="grid">${supportMessages.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0)).map(m=>`<div class="card"><h2>${m.userName||'User'}</h2><p class="muted">${m.userEmail||''}</p><p>${m.message||''}</p><p>Status: ${m.status||'open'}</p>${m.reply?`<div class="card"><b>Reply</b><p>${m.reply}</p></div>`:''}<textarea id="reply_${m.id}" placeholder="Write admin reply">${m.reply||''}</textarea><div class="row"><button class="primary" onclick="replySupport('${m.id}')">Reply</button><button onclick="closeSupport('${m.id}')">Close</button><button class="danger" onclick="removeItem('supportMessages','${m.id}')">Delete</button></div></div>`).join('')||'<p class="muted">No support messages.</p>'}</div>`}
window.replySupport=async id=>{let v=$('#reply_'+id)?.value.trim();if(!v)return toast('Write reply');await updateDoc(doc(db,'supportMessages',id),{reply:v,status:'replied',repliedAt:serverTimestamp()});toast('Reply sent')}
window.closeSupport=async id=>{await updateDoc(doc(db,'supportMessages',id),{status:'closed',closedAt:serverTimestamp()});toast('Closed')}
function notificationsHtml(){return`<h1>Send Notification</h1><p class="muted">Send an announcement to all users. It will appear in user Notifications.</p><div class="card form"><input id="ntitle" placeholder="Notification title"><textarea id="nmsg" placeholder="Notification message"></textarea><input id="nlink" placeholder="Optional button link"><button class="primary" onclick="sendNotification()">Send to All Users</button></div><div class="grid">${notifications.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0)).map(n=>`<div class="card"><h2>${n.title}</h2><p>${n.message}</p><p>${n.link||''}</p><button class="danger" onclick="removeItem('notifications','${n.id}')">Delete</button></div>`).join('')||'<p class="muted">No notifications.</p>'}</div>`}
window.sendNotification=async()=>{let title=$('#ntitle').value.trim(),message=$('#nmsg').value.trim();if(!title||!message)return toast('Write title and message');await addDoc(collection(db,'notifications'),{userId:'all',title,message,link:$('#nlink').value,createdAt:serverTimestamp()});toast('Notification sent')}
function usersHtml(){return`<h1>Users</h1><div class="table"><table><tr><th>Name</th><th>Email</th><th>Plan</th><th>Points</th></tr>${users.map(u=>`<tr><td>${u.name||'User'}</td><td>${u.email}</td><td>${u.plan||'Basic'}</td><td>${u.points||0}</td></tr>`).join('')}</table></div>`}
function settingsHtml(){return`<h1>Settings</h1><div class="card form"><input id="freePts" type="number" value="${settings.freeReferralPoints||settings.referralPoints||20}" placeholder="Points for free referral signup"><input id="paidPct" type="number" value="${settings.paidReferralPercent||20}" placeholder="USDT percentage for paid plan referral"><input id="ptprice" type="number" step="0.001" value="${settings.pointPrice||0.02}" placeholder="Price per point"><label class="card"><input id="pointsRedeemEnabled" type="checkbox" ${settings.pointsRedeemEnabled===false?'':'checked'}> Points redeem system ON</label><input id="support" value="${settings.supportUrl||''}" placeholder="Support URL or @username optional"><input id="vip" value="${settings.vipChannelLink||''}" placeholder="VIP channel link"><button class="primary" onclick="saveSettings()">Save Settings</button></div>`}
window.saveSettings=async()=>{await setDoc(doc(db,'settings','main'),{freeReferralPoints:Number($('#freePts').value||20),referralPoints:Number($('#freePts').value||20),paidReferralPercent:Number($('#paidPct').value||20),pointPrice:Number($('#ptprice').value||0.02),pointsRedeemEnabled:$('#pointsRedeemEnabled').checked,supportUrl:$('#support').value,vipChannelLink:$('#vip').value},{merge:true});toast('Settings saved')}
window.removeItem=async(col,id)=>{if(!confirm('Delete this item?'))return;try{await deleteDoc(doc(db,col,id));toast('Deleted')}catch(e){toast(e.message)}}
onAuthStateChanged(auth,u=>{me=u;if(!u){redraw();return}onSnapshot(collection(db,'users'),s=>{users=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(collection(db,'orders'),s=>{orders=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(collection(db,'methods'),s=>{methods=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(collection(db,'products'),s=>{products=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(collection(db,'withdrawals'),s=>{withdrawals=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(collection(db,'community'),s=>{community=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(collection(db,'paymentMethods'),s=>{payments=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(collection(db,'plans'),s=>{plans=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(collection(db,'coupons'),s=>{coupons=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(collection(db,'supportMessages'),s=>{supportMessages=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(collection(db,'notifications'),s=>{notifications=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(collection(db,'pointRedeems'),s=>{pointRedeems=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(doc(db,'settings','main'),s=>{settings={...settings,...(s.data()||{})};redraw()})});

;color:#fff}.row{display:flex;gap:10px;flex-wrap:wrap}.table{width:100%;overflow:auto}.table table{width:100%;border-collapse:collapse}.table td,.table th{padding:12px;border-bottom:1px solid #29466c;text-align:left;white-space:nowrap}#toast{position:fixed;left:50%;bottom:25px;transform:translateX(-50%);background:#111b2a;padding:14px 20px;border-radius:16px;display:none;z-index:120}#toast.show{display:block}@media(max-width:900px){.side{left:-310px;width:300px;transition:.25s}.side.open{left:0}.side~.main,.side~.mobilebar~.main{margin-left:auto;max-width:1180px}.mobilebar{display:flex;position:sticky;top:0;z-index:30;align-items:center;gap:12px;padding:16px;background:#081424;border-bottom:1px solid #223a5d}.main{padding:34px 18px}.top{padding:16px 18px}.brand{font-size:24px}.logoIcon{width:56px;height:56px}.hero{padding:54px 18px}.heroBtns{display:grid}.grid{grid-template-columns:1fr}.methodGrid{grid-template-columns:1fr}.row{display:grid}.row button,.row .btn{width:100%}}
