<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GlobexoMart Users</title><script type="module">

import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js';
import{getAuth,createUserWithEmailAndPassword,signInWithEmailAndPassword,onAuthStateChanged,signOut}from'https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js';
import{getFirestore,doc,setDoc,addDoc,collection,onSnapshot,serverTimestamp,updateDoc,increment,arrayUnion,getDoc,query,where,getDocs}from'https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js';
const firebaseConfig={apiKey:"AIzaSyC7SjMgzuH7stBaTP-jqkHfXDLmnNJV0X8",authDomain:"globexo-d9ade.firebaseapp.com",databaseURL:"https://globexo-d9ade-default-rtdb.firebaseio.com",projectId:"globexo-d9ade",storageBucket:"globexo-d9ade.firebasestorage.app",messagingSenderId:"1009453417317",appId:"1:1009453417317:web:32538a719df79d3c6ed78c",measurementId:"G-X0QPY3ML6M"};
const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getFirestore(app);
let me=null,profile={},plans=[],methods=[],products=[],orders=[],earnings=[],withdrawals=[],community=[],payments=[],coupons=[],settings={referralPoints:20,pointPrice:0.02,supportUrl:'',vipChannelLink:''};
const rank={Free:0,Basic:0,Standard:1,Plus:2,Pro:3};
const defaultPlans=[{id:'standard-default',name:'Standard',price:20,durationDays:30,description:'1 month access to Standard methods and VIP channel.'},{id:'plus-default',name:'Plus',price:30,durationDays:180,description:'6 months access to Standard and Plus methods with VIP channel.'},{id:'pro-default',name:'Pro',price:50,durationDays:36500,description:'Lifetime access to all Standard, Plus and Pro methods.'}];
function allPlans(){return plans.length?plans:defaultPlans}
const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];
function toast(t){let el=$('#toast'); if(!el)return; el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500)}
function money(n){return '$'+Number(n||0).toFixed(2)}
function points(n){return Number(n||0).toLocaleString()+' Points'}
function code(){return profile.referralCode||('REF'+(me?.uid||'').slice(0,8).toUpperCase())}
function refUrl(){return location.origin+location.pathname+'?ref='+code()}
function qref(){return new URLSearchParams(location.search).get('ref')||''}
function show(id){$$('.page').forEach(p=>p.classList.remove('active'));$('#'+id)?.classList.add('active');$$('.nav button').forEach(b=>b.classList.toggle('on',b.dataset.page==id));if(id==='methods')setTimeout(()=>filterMethods('All'),10);document.querySelector('.side')?.classList.remove('open')}
function landing(){let preview=methods.slice(0,6).map(methodCard).join('')||'<div class="card"><h2>Methods coming soon</h2><p class="muted">Admin will upload guides, videos, Drive links, documents, and post links here.</p></div>';return`<header class="top"><div class="brand"><img class="logoIcon" src="globexomart-learn-earn-icon.svg"><b>GlobexoMart</b></div></header><section class="hero"><span>Premium Methods • Real Earnings</span><h1>Unlock Premium Methods<br><b class="grad">& Grow Your Earnings</b></h1><p class="muted">Access high quality earning methods, step-by-step guides, referral rewards, and private plan community access.</p><div class="heroBtns"><button class="primary" onclick="openAuth('signup')">Create Account</button><button onclick="openAuth('login')">Login to Account</button></div></section><main class="main"><div class="grid"><div class="card stat"><h2>$18K+</h2><p class="muted">Total member earnings</p></div><div class="card stat"><h2>$4.7K</h2><p class="muted">30 day earnings</p></div><div class="card stat"><h2>92%</h2><p class="muted">Method satisfaction</p></div></div><div class="chart" style="margin:24px 0"><div class="bar" style="height:30%"></div><div class="bar" style="height:46%"></div><div class="bar" style="height:38%"></div><div class="bar" style="height:65%"></div><div class="bar" style="height:78%"></div><div class="bar" style="height:70%"></div><div class="bar" style="height:92%"></div></div><h1>Latest Methods</h1><div class="methodGrid">${preview}</div><h1 style="margin-top:34px">Digital Products</h1><div class="methodGrid">${products.slice(0,6).map(productCard).join('')||'<div class="card"><h2>Products coming soon</h2><p class="muted">Admin can add digital products with thumbnails, details, discounts, and instant delivery after approval.</p></div>'}</div></main>`}
function redraw(){if(!me){$('#app').innerHTML=landing();return}let total=earnings.reduce((a,b)=>a+Number(b.amount||0),0),pending=orders.filter(o=>o.status==='pending').length;$('#app').innerHTML=`<aside class="side"><div class="brand"><img class="logoIcon" src="globexomart-learn-earn-icon.svg"><b>GlobexoMart</b></div><nav class="nav"><button class="on" data-page="dash">Dashboard</button><button data-page="plans">Plans</button><button data-page="methods">Methods</button><button data-page="products">Products</button><button data-page="points">Points</button><button data-page="ref">Referral</button><button data-page="withdraw">Withdraw</button><button data-page="community">Community</button><button onclick="supportOpen()">Support</button><button class="danger" onclick="signOut(auth)">Logout</button></nav></aside><header class="mobilebar"><button onclick="document.querySelector('.side').classList.toggle('open')">☰</button><div class="brand"><img class="logoIcon" src="globexomart-learn-earn-icon.svg"><b>GlobexoMart</b></div></header><main class="main"><section id="dash" class="page active">${dash(total,pending)}</section><section id="plans" class="page">${plansHtml()}</section><section id="methods" class="page">${methodsHtml()}</section><section id="products" class="page">${productsHtml()}</section><section id="points" class="page">${pointsHtml()}</section><section id="ref" class="page">${refHtml(total)}</section><section id="withdraw" class="page">${withdrawHtml(total)}</section><section id="community" class="page">${communityHtml()}</section></main>`;$$('.nav button[data-page]').forEach(b=>b.onclick=()=>show(b.dataset.page));drawChart(total)}
function dash(total,pending){return`<h1>Dashboard</h1><p class="muted">Welcome ${profile.name||''}. Track plan access, referral points, earnings, orders, and withdrawals.</p><div class="grid"><div class="card stat"><small>Current Plan</small><h2>${profile.plan||'Basic'}</h2><p class="muted">${profile.planExpiry?'Expires: '+new Date(profile.planExpiry).toLocaleDateString():'Free access'}</p></div><div class="card stat"><small>Your Points</small><h2>${points(profile.points)}</h2><p class="muted">Use points to unlock selected methods.</p></div><div class="card stat"><small>Total Earnings</small><h2>${money(total)}</h2></div><div class="card stat"><small>Pending Orders</small><h2>${pending}</h2></div></div><h2 style="margin-top:28px">Referral Growth</h2><canvas id="chart" class="chart"></canvas><h2>Pending Orders</h2><div class="grid">${orders.filter(o=>o.status==='pending').map(o=>`<div class="card"><b>${o.type==='points'?points(o.points):(o.type==='product'?o.productTitle:o.planName||'Order')}</b><p>TX: ${o.txid||''}</p><p>Status: pending</p></div>`).join('')||'<p class="muted">No orders yet.</p>'}</div>`}
function plansHtml(){let ps=allPlans();return`<h1>Choose Plan</h1><div class="grid">${ps.map(p=>`<div class="card"><h2>${p.name}</h2><h1>${money(p.price)}</h1>${p.discount?`<span class="tag points">${p.discount}% discount</span>`:''}<p class="muted">${p.name==='Pro'?'Lifetime access':(p.durationDays||30)+' days access'}</p><p>${p.description||''}</p><button class="primary" onclick="buyPlan('${p.id}')">Buy Plan</button></div>`).join('')}</div>`}

function productCard(p){let th=p.thumbnail||'';return`<div class="card method"><div class="thumb">${th?`<img src="${th}" onerror="this.parentElement.innerHTML='🛍️'">`:'🛍️'}</div><div class="methodBody"><h2>${p.title||'Digital Product'}</h2><p class="muted">${p.details||'Digital product delivered as text or link after admin approval.'}</p><div>${p.discount?`<span class="tag points">${p.discount}% off</span>`:''}${p.bulkQty?`<span class="tag free">Bulk: ${p.bulkQty}+ saves ${p.bulkDiscount||0}%</span>`:''}</div><h2>${money(productUnitPrice(p,1))}</h2><button class="primary" onclick="buyProduct('${p.id}')">Buy Product</button></div></div>`}
function productUnitPrice(p,q){let price=Number(p.price||0);if(p.discount)price-=price*Number(p.discount||0)/100;if(p.bulkQty&&q>=Number(p.bulkQty))price-=price*Number(p.bulkDiscount||0)/100;return Math.max(0,price)}
function productsHtml(){return`<h1>Products</h1><p class="muted">Buy digital products. After payment approval, delivery appears in your order.</p><div class="methodGrid">${products.map(productCard).join('')||'<div class="card">No products yet.</div>'}</div><h2 style="margin-top:28px">Your Product Orders</h2><div class="grid">${orders.filter(o=>o.type==='product').map(o=>`<div class="card"><h2>${o.productTitle}</h2><p>Status: ${o.status}</p><p>Quantity: ${o.quantity||1}</p><p>Paid: ${money(o.amount)}</p>${o.status==='approved'?`<div class="card"><b>Delivery</b><p style="white-space:pre-wrap">${o.deliveryText||''}</p>${o.deliveryLink?`<a class="btn primary" target="_blank" href="${o.deliveryLink}">Open Link</a>`:''}</div>`:''}</div>`).join('')||'<p class="muted">No product orders yet.</p>'}</div>`}
window.buyProduct=id=>{let p=products.find(x=>x.id===id);if(!p)return;openModal(`<h2>Buy ${p.title}</h2><p class="muted">${p.details||''}</p><input id="qty" type="number" min="1" value="1" oninput="calcProduct('${id}')"><div id="prodTotal"></div><select id="payMethod" onchange="selectedPayment()">${paymentOptions()}</select><div id="payInfo"></div><input id="txid" placeholder="Transaction ID"><textarea id="proof" placeholder="Proof / screenshot URL optional"></textarea><button class="primary" onclick="submitProductOrder('${id}')">Submit Payment</button>`);selectedPayment();calcProduct(id)}
window.calcProduct=id=>{let p=products.find(x=>x.id===id),q=Number($('#qty')?.value||1),unit=productUnitPrice(p,q);$('#prodTotal').innerHTML=`<p>Unit: <b>${money(unit)}</b> • Total: <b>${money(unit*q)}</b></p>`}
window.submitProductOrder=async id=>{let p=products.find(x=>x.id===id),q=Number($('#qty').value||1),unit=productUnitPrice(p,q),pm=payments.find(x=>x.id==$('#payMethod').value)||{};await addDoc(collection(db,'orders'),{type:'product',userId:me.uid,userEmail:me.email,userName:profile.name||'',productId:id,productTitle:p.title,quantity:q,amount:unit*q,status:'pending',txid:$('#txid').value,proof:$('#proof').value,paymentMethod:pm.name,paymentAddress:pm.address,deliveryText:p.deliveryText||'',deliveryLink:p.deliveryLink||'',createdAt:serverTimestamp()});closeModal();toast('Product payment submitted. Wait for admin approval.')}

function pointsHtml(){return`<h1>Buy Points</h1><p class="muted">You can earn points from referrals or buy points directly. Price per point: ${money(settings.pointPrice||0.02)}</p><div class="card form"><input id="pointsAmount" type="number" placeholder="How many points? e.g. 500"><button class="primary" onclick="buyPoints()">Continue Payment</button></div>`}
function assetsOf(m){return [['Video',m.videoUrl],['Document',m.documentUrl],['Google Drive',m.driveUrl||m.link],['VIP Post',m.vipPostUrl],['Free Post',m.freePostUrl],['Extra Link',m.extraUrl]].filter(x=>x[1])}
function methodCard(m){let th=m.thumbnail||m.image||m.imageUrl||'',levels=m.levels||['Free'],bought=(profile.purchasedMethods||[]).includes(m.id);return`<div class="card method"><div class="thumb">${th?`<img src="${th}" onerror="this.parentElement.innerHTML='📚'">`:'📚'}</div><div class="methodBody"><h2>${m.title||'Untitled Method'}</h2><p class="muted">${m.description||'Video, documents, Drive links, and post links can be added by admin.'}</p><div>${levels.map(l=>`<span class="tag ${l==='Free'?'free':''}">${l}</span>`).join('')}${m.expired?'<span class="tag expired">Expired</span>':''}${m.allowPoints?`<span class="tag points">${points(m.pointsPrice)}</span>`:''}${bought?'<span class="tag free">Owned</span>':''}</div><div class="row" style="margin-top:12px"><button class="primary" onclick="openMethod('${m.id}')">Open Method</button>${m.allowPoints?`<button onclick="buyMethodPoints('${m.id}')">Buy with Points</button>`:''}</div></div></div>`}
function methodsHtml(){let tabs=['All','Free','Standard','Plus','Pro'];return`<h1>Methods</h1><p class="muted">Free methods open for everyone. Locked methods can be opened by plan access or by points when admin allows it.</p><div class="methodTabs">${tabs.map(t=>`<button onclick="filterMethods('${t}')">${t}</button>`).join('')}</div><div id="methodList" class="methodGrid"></div>`}
window.filterMethods=t=>{let list=methods.filter(m=>t==='All'||(m.levels||[]).includes(t));$('#methodList').innerHTML=list.map(methodCard).join('')||'<div class="card">No methods here yet.</div>'}
function refHtml(total){return`<h1>Referral</h1><div class="grid"><div class="card"><small>Your referral code</small><h2>${code()}</h2><button onclick="navigator.clipboard.writeText('${refUrl()}');toast('Referral link copied')">Copy Link</button></div><div class="card"><small>Per referral reward</small><h2>${points(settings.referralPoints||20)}</h2><p class="muted">Points are added when your referred user is approved by admin.</p></div><div class="card"><small>Referral Earnings</small><h2>${money(total)}</h2></div></div>`}
function withdrawHtml(total){let pending=withdrawals.filter(w=>w.status==='pending').reduce((a,b)=>a+Number(b.amount||0),0);return`<h1>Withdraw</h1><div class="grid"><div class="card"><small>Available</small><h2>${money(total-pending)}</h2></div><div class="card"><small>Pending</small><h2>${money(pending)}</h2></div></div><div class="card form"><input id="wamount" type="number" placeholder="Amount"><input id="wmethod" placeholder="Payment method name"><textarea id="waccount" placeholder="Account / address where admin should pay"></textarea><button class="primary" onclick="requestWithdraw()">Request Withdraw</button></div>`}
function communityHtml(){let paid=rank[profile.plan||'Basic']>0;return`<h1>Community</h1><div class="grid">${community.map(c=>`<a class="card linkCard" href="${c.url}" target="_blank"><h2>${c.name}</h2><p class="muted">${c.description||''}</p></a>`).join('')||'<div class="card">Community links will appear here.</div>'}${paid&&settings.vipChannelLink?`<a class="card linkCard" href="${settings.vipChannelLink}" target="_blank"><h2>VIP Channel</h2><p class="muted">Private plan members channel.</p></a>`:''}</div>`}
function paymentOptions(){return payments.length?payments.map(p=>`<option value="${p.id}">${p.name}</option>`).join(''):'<option value="">No payment method added</option>'}
window.selectedPayment=()=>{let p=payments.find(x=>x.id==$('#payMethod')?.value);let el=$('#payInfo');if(el)el.innerHTML=p?`<div class="card"><b>${p.name}</b><p>${p.address}</p><button onclick="navigator.clipboard.writeText('${p.address}');toast('Copied')">Copy Address</button></div>`:''}
function activeCoupon(c,kind){let now=Date.now();if(!c||c.active===false)return false;if(c.target&&c.target!=='all'&&c.target!==kind)return false;if(c.expiresAt&&Number(c.expiresAt)<now)return false;if(c.maxUses&&Number(c.usedCount||0)>=Number(c.maxUses))return false;return true}
function couponDiscount(code,kind,amount){let c=coupons.find(x=>(x.code||'').toUpperCase()===(code||'').toUpperCase());if(!activeCoupon(c,kind))return {coupon:null,discount:0,final:amount};let discount=c.type==='fixed'?Number(c.value||0):amount*Number(c.value||0)/100;discount=Math.min(amount,discount);return {coupon:c,discount,final:Math.max(0,amount-discount)}}
window.buyPlan=id=>{let p=allPlans().find(x=>x.id===id);if(!p)return;openModal(`<h2>Pay for ${p.name}</h2><p>Amount: <b>${money(p.price)}</b></p><select id="payMethod" onchange="selectedPayment()">${paymentOptions()}</select><div id="payInfo"></div><input id="coupon" placeholder="Coupon code optional"><button onclick="applyCoupon('${id}')">Apply Coupon</button><div id="couponResult"></div><input id="txid" placeholder="Transaction ID"><textarea id="proof" placeholder="Proof / screenshot URL optional"></textarea><button class="primary" onclick="submitPlanOrder('${id}')">Submit Payment</button>`);selectedPayment()}
window.applyCoupon=id=>{let p=allPlans().find(x=>x.id===id),r=couponDiscount($('#coupon').value,'plan',Number(p.price||0));$('#couponResult').innerHTML=r.coupon?`Discount: ${money(r.discount)} • Pay: <b>${money(r.final)}</b>`:'No valid coupon'}
window.buyPoints=()=>{let pointsQty=Number($('#pointsAmount').value||0);if(!pointsQty)return toast('Enter points');let amount=pointsQty*Number(settings.pointPrice||0.02);openModal(`<h2>Buy ${points(pointsQty)}</h2><p>Amount: <b>${money(amount)}</b></p><select id="payMethod" onchange="selectedPayment()">${paymentOptions()}</select><div id="payInfo"></div><input id="coupon" placeholder="Coupon code optional"><button onclick="applyPointsCoupon(${pointsQty},${amount})">Apply Coupon</button><div id="couponResult"></div><input id="txid" placeholder="Transaction ID"><textarea id="proof" placeholder="Proof / screenshot URL optional"></textarea><button class="primary" onclick="submitPointsOrder(${pointsQty},${amount})">Submit Payment</button>`);selectedPayment()}
window.applyPointsCoupon=(q,a)=>{let r=couponDiscount($('#coupon').value,'points',Number(a||0));$('#couponResult').innerHTML=r.coupon?`Discount: ${money(r.discount)} • Pay: <b>${money(r.final)}</b>`:'No valid coupon'}
window.submitPlanOrder=async id=>{let p=allPlans().find(x=>x.id===id),pm=payments.find(x=>x.id==$('#payMethod').value)||{},cr=couponDiscount($('#coupon').value,'plan',Number(p.price||0));await addDoc(collection(db,'orders'),{type:'plan',userId:me.uid,userEmail:me.email,userName:profile.name||'',planId:id,planName:p.name,amount:cr.final,originalAmount:p.price,couponCode:cr.coupon?.code||'',status:'pending',txid:$('#txid').value,proof:$('#proof').value,paymentMethod:pm.name,paymentAddress:pm.address,referralCode:profile.usedReferral||'',createdAt:serverTimestamp()});closeModal();toast('Payment submitted. Wait for admin approval.')}
window.submitPointsOrder=async(pointsQty,amount)=>{let pm=payments.find(x=>x.id==$('#payMethod').value)||{},cr=couponDiscount($('#coupon').value,'points',Number(amount||0));await addDoc(collection(db,'orders'),{type:'points',userId:me.uid,userEmail:me.email,userName:profile.name||'',points:pointsQty,amount:cr.final,originalAmount:amount,couponCode:cr.coupon?.code||'',status:'pending',txid:$('#txid').value,proof:$('#proof').value,paymentMethod:pm.name,paymentAddress:pm.address,createdAt:serverTimestamp()});closeModal();toast('Points order submitted.')}
window.openMethod=id=>{let m=methods.find(x=>x.id===id);if(!m)return;if(m.expired)return toast('This method is expired');let owned=(profile.purchasedMethods||[]).includes(id),ok=owned||(m.levels||['Free']).some(l=>l==='Free'||rank[profile.plan||'Basic']>=rank[l]);if(!ok){show('plans');return toast('Upgrade plan or buy with points to open this method')}let links=assetsOf(m).map(a=>`<a class="btn" target="_blank" href="${a[1]}">${a[0]}</a>`).join('');openModal(`<h2>${m.title}</h2><p>${m.description||''}</p><div class="row">${links||'<p>No files/links added yet.</p>'}</div>`)}
window.buyMethodPoints=async id=>{let m=methods.find(x=>x.id===id);if(!m?.allowPoints)return;if(Number(profile.points||0)<Number(m.pointsPrice||0))return toast('Not enough Points');await updateDoc(doc(db,'users',me.uid),{points:increment(-Number(m.pointsPrice||0)),purchasedMethods:arrayUnion(id)});toast('Method unlocked with Points')}
window.requestWithdraw=async()=>{let amount=Number($('#wamount').value||0);if(!amount)return toast('Enter amount');await addDoc(collection(db,'withdrawals'),{userId:me.uid,userEmail:me.email,userName:profile.name||'',amount,method:$('#wmethod').value,account:$('#waccount').value,status:'pending',createdAt:serverTimestamp()});toast('Withdraw request sent')}
window.supportOpen=()=>{let u=settings.supportUrl||settings.supportUsername||'';if(!u)return toast('Support link not set');if(u.startsWith('@'))u='https://t.me/'+u.slice(1);window.open(u,'_blank')}
window.openAuth=mode=>openModal(`<h2>${mode==='login'?'Login':'Create Account'}</h2><div class="form">${mode==='signup'?'<input id="name" placeholder="Full Name">':''}<input id="email" placeholder="Gmail / Email"><input id="pass" type="password" placeholder="Password">${mode==='signup'?`<input id="pass2" type="password" placeholder="Confirm Password"><input id="ref" placeholder="Referral code optional" value="${qref()}">`:''}<button class="primary" onclick="authGo('${mode}')">Continue</button></div>`)
window.authGo=async mode=>{try{let email=$('#email').value.trim(),pass=$('#pass').value;if(mode==='signup'){if(pass!==$('#pass2').value)return toast('Passwords not match');let cr=await createUserWithEmailAndPassword(auth,email,pass);let referralCode='REF'+cr.user.uid.slice(0,8).toUpperCase();await setDoc(doc(db,'users',cr.user.uid),{name:$('#name').value,email,plan:'Basic',points:0,referralCode,usedReferral:$('#ref').value.trim().toUpperCase(),createdAt:serverTimestamp()})}else await signInWithEmailAndPassword(auth,email,pass);closeModal()}catch(e){toast(e.message)}}
function openModal(h){$('#modalBody').innerHTML=h;$('#modal').classList.add('show')}window.closeModal=()=>$('#modal').classList.remove('show');
function drawChart(t){setTimeout(()=>{let c=$('#chart');if(!c)return;let x=c.getContext('2d'),w=c.width=c.offsetWidth,h=c.height=180;x.clearRect(0,0,w,h);let vals=[12,24,18,40,35,55,Math.max(70,Number(t||0)+60)],mx=Math.max(...vals);x.lineWidth=6;x.strokeStyle='#55e6ac';x.beginPath();vals.forEach((v,i)=>{let px=i*(w/(vals.length-1)),py=h-20-v/mx*(h-45);i?x.lineTo(px,py):x.moveTo(px,py)});x.stroke()},80)}
function listenPublic(){onSnapshot(collection(db,'methods'),s=>{methods=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(collection(db,'products'),s=>{products=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(doc(db,'settings','main'),s=>{settings={...settings,...(s.data()||{})};redraw()})}
onAuthStateChanged(auth,u=>{me=u;if(!u){listenPublic();redraw();return}onSnapshot(doc(db,'users',u.uid),s=>{profile=s.data()||{};redraw()});onSnapshot(collection(db,'plans'),s=>{plans=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(collection(db,'methods'),s=>{methods=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(collection(db,'products'),s=>{products=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(collection(db,'orders'),s=>{orders=s.docs.map(d=>({id:d.id,...d.data()})).filter(o=>o.userId===u.uid);redraw()});onSnapshot(collection(db,'earnings'),s=>{earnings=s.docs.map(d=>({id:d.id,...d.data()})).filter(e=>e.userId===u.uid);redraw()});onSnapshot(collection(db,'withdrawals'),s=>{withdrawals=s.docs.map(d=>({id:d.id,...d.data()})).filter(w=>w.userId===u.uid);redraw()});onSnapshot(collection(db,'community'),s=>{community=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(collection(db,'paymentMethods'),s=>{payments=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(collection(db,'coupons'),s=>{coupons=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(doc(db,'settings','main'),s=>{settings={...settings,...(s.data()||{})};redraw()})});
