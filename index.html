<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GlobexoMart Admin</title><script type="module">

import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js';
import{getAuth,signInWithEmailAndPassword,onAuthStateChanged,signOut}from'https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js';
import{getFirestore,doc,setDoc,addDoc,collection,onSnapshot,serverTimestamp,updateDoc,deleteDoc,increment,arrayUnion,query,where,getDocs}from'https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js';
const firebaseConfig={apiKey:"AIzaSyC7SjMgzuH7stBaTP-jqkHfXDLmnNJV0X8",authDomain:"globexo-d9ade.firebaseapp.com",databaseURL:"https://globexo-d9ade-default-rtdb.firebaseio.com",projectId:"globexo-d9ade",storageBucket:"globexo-d9ade.firebasestorage.app",messagingSenderId:"1009453417317",appId:"1:1009453417317:web:32538a719df79d3c6ed78c",measurementId:"G-X0QPY3ML6M"};
const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getFirestore(app);
let me=null,users=[],orders=[],methods=[],products=[],withdrawals=[],community=[],payments=[],plans=[],coupons=[],settings={adminEmails:['admin@globexomart.com'],referralPoints:20,pointPrice:0.02,supportUrl:'',vipChannelLink:''};
const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];function toast(t){let el=$('#toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500)}function money(n){return '$'+Number(n||0).toFixed(2)}function show(id){$$('.page').forEach(p=>p.classList.remove('active'));$('#'+id)?.classList.add('active');$$('.nav button').forEach(b=>b.classList.toggle('on',b.dataset.page==id));document.querySelector('.side')?.classList.remove('open')}
function redraw(){if(!me){$('#app').innerHTML=login();return}let std=users.filter(u=>u.plan==='Standard').length,plus=users.filter(u=>u.plan==='Plus').length,pro=users.filter(u=>u.plan==='Pro').length,premium=std+plus+pro,pending=orders.filter(o=>o.status==='pending').length;$('#app').innerHTML=`<aside class="side"><div class="brand"><img class="logoIcon" src="globexomart-learn-earn-icon.svg"><b>Admin</b></div><nav class="nav"><button class="on" data-page="dash">Dashboard</button><button data-page="plans">Plans</button><button data-page="coupons">Coupons</button><button data-page="orders">Orders</button><button data-page="methods">Methods</button><button data-page="products">Products</button><button data-page="payments">Payment Methods</button><button data-page="withdrawals">Withdrawals</button><button data-page="community">Community</button><button data-page="users">Users</button><button data-page="settings">Settings</button><button class="danger" onclick="signOut(auth)">Logout</button></nav></aside><header class="mobilebar"><button onclick="document.querySelector('.side').classList.toggle('open')">☰</button><div class="brand"><img class="logoIcon" src="globexomart-learn-earn-icon.svg"><b>GlobexoMart Admin</b></div></header><main class="main"><section id="dash" class="page active"><h1>Dashboard</h1><div class="grid"><div class="card stat"><small>Total Users</small><h2>${users.length}</h2></div><div class="card stat"><small>Premium</small><h2>${premium}</h2></div><div class="card stat"><small>Standard</small><h2>${std}</h2></div><div class="card stat"><small>Plus</small><h2>${plus}</h2></div><div class="card stat"><small>Pro</small><h2>${pro}</h2></div><div class="card stat"><small>Pending Orders</small><h2>${pending}</h2></div></div></section><section id="plans" class="page">${plansHtml()}</section><section id="coupons" class="page">${couponsHtml()}</section><section id="orders" class="page">${ordersHtml()}</section><section id="methods" class="page">${methodsHtml()}</section><section id="products" class="page">${productsHtml()}</section><section id="payments" class="page">${paymentsHtml()}</section><section id="withdrawals" class="page">${withdrawHtml()}</section><section id="community" class="page">${communityHtml()}</section><section id="users" class="page">${usersHtml()}</section><section id="settings" class="page">${settingsHtml()}</section></main>`;$$('.nav button[data-page]').forEach(b=>b.onclick=()=>show(b.dataset.page))}
function login(){return`<main class="main" style="max-width:520px"><div class="card form"><div class="brand"><img class="logoIcon" src="globexomart-learn-earn-icon.svg"><b>Admin Login</b></div><input id="email" placeholder="Admin email"><input id="pass" type="password" placeholder="Password"><button class="primary" onclick="adminLogin()">Login</button></div></main>`}
window.adminLogin=async()=>{try{await signInWithEmailAndPassword(auth,$('#email').value,$('#pass').value)}catch(e){toast(e.message)}}
function plansHtml(){return`<h1>Plans</h1><button class="primary" onclick="seedPlans()">Create Default Plans</button><p class="muted">Default: Standard 1 month $20, Plus 6 months $30, Pro lifetime $50. You can edit price, duration, discount, and benefits anytime.</p><div class="card form"><input id="plId" type="hidden"><input id="plName" placeholder="Plan name: Standard / Plus / Pro"><input id="plPrice" type="number" step="0.01" placeholder="Price"><input id="plDiscount" type="number" placeholder="Discount percentage optional"><input id="plDays" type="number" placeholder="Duration days (36500 = lifetime)"><textarea id="plDesc" placeholder="Benefits / description"></textarea><button class="primary" onclick="savePlan()">Save Plan</button></div><div class="grid">${plans.map(p=>`<div class="card"><h2>${p.name}</h2><h1>${money(p.price)}</h1><p>Duration: ${Number(p.durationDays)>10000?'Lifetime':(p.durationDays||30)+' days'}</p><p>Discount: ${p.discount||0}%</p><p>${p.description||''}</p><div class="row"><button onclick="editPlan('${p.id}')">Edit</button><button class="danger" onclick="deleteDoc(doc(db,'plans','${p.id}'))">Delete</button></div></div>`).join('')||'<p class="muted">No plans yet. Click Create Default Plans.</p>'}</div>`}
window.editPlan=id=>{let p=plans.find(x=>x.id===id);if(!p)return;$('#plId').value=id;$('#plName').value=p.name||'';$('#plPrice').value=p.price||'';$('#plDiscount').value=p.discount||'';$('#plDays').value=p.durationDays||'';$('#plDesc').value=p.description||'';toast('Plan loaded for edit')}
window.seedPlans=async()=>{let defs=[['Standard',20,30,'1 month access to Standard methods and VIP channel.'],['Plus',30,180,'6 months access to Standard and Plus methods with VIP channel.'],['Pro',50,36500,'Lifetime access to all Standard, Plus and Pro methods.']];for(let d of defs){await setDoc(doc(db,'plans',d[0].toLowerCase()),{name:d[0],price:d[1],durationDays:d[2],discount:0,description:d[3],updatedAt:serverTimestamp()},{merge:true})}toast('Default plans created')};
window.savePlan=async()=>{let data={name:$('#plName').value,price:Number($('#plPrice').value||0),discount:Number($('#plDiscount').value||0),durationDays:Number($('#plDays').value||30),description:$('#plDesc').value,updatedAt:serverTimestamp()};let id=$('#plId').value;if(id)await setDoc(doc(db,'plans',id),data,{merge:true});else await addDoc(collection(db,'plans'),{...data,createdAt:serverTimestamp()});toast('Plan saved')}
function couponsHtml(){return`<h1>Coupons</h1><div class="card form"><input id="cpId" type="hidden"><input id="cpCode" placeholder="Coupon code"><select id="cpType"><option value="percent">Percent discount</option><option value="fixed">Fixed amount</option></select><input id="cpValue" type="number" step="0.01" placeholder="Discount value"><select id="cpTarget"><option value="all">All</option><option value="plan">Plans only</option><option value="points">Points only</option></select><select id="cpUse"><option value="single">Single use</option><option value="multiple">Multiple use</option></select><input id="cpMax" type="number" placeholder="Max uses for multiple use"><input id="cpExpire" type="datetime-local" placeholder="Expire time optional"><label><input id="cpActive" type="checkbox" checked> Active</label><button class="primary" onclick="saveCoupon()">Save Coupon</button></div><div class="grid">${coupons.map(c=>`<div class="card"><h2>${c.code}</h2><p>${c.type==='fixed'?money(c.value):c.value+'%'} • ${c.target||'all'}</p><p>Uses: ${c.usedCount||0}/${c.maxUses||'∞'}</p><p>${c.expiresAt?'Expires: '+new Date(Number(c.expiresAt)).toLocaleString():'No expiry'}</p><p>Status: ${c.active===false?'Disabled':'Active'}</p><div class="row"><button onclick="editCoupon('${c.id}')">Edit</button><button class="danger" onclick="deleteDoc(doc(db,'coupons','${c.id}'))">Delete</button></div></div>`).join('')||'<p class="muted">No coupons yet.</p>'}</div>`}
window.editCoupon=id=>{let c=coupons.find(x=>x.id===id);if(!c)return;$('#cpId').value=id;$('#cpCode').value=c.code||'';$('#cpType').value=c.type||'percent';$('#cpValue').value=c.value||'';$('#cpTarget').value=c.target||'all';$('#cpUse').value=c.maxUses==1?'single':'multiple';$('#cpMax').value=c.maxUses||'';$('#cpActive').checked=c.active!==false;if(c.expiresAt){let d=new Date(Number(c.expiresAt));$('#cpExpire').value=d.toISOString().slice(0,16)}toast('Coupon loaded for edit')}
window.saveCoupon=async()=>{let max=$('#cpUse').value==='single'?1:Number($('#cpMax').value||0)||null,exp=$('#cpExpire').value?new Date($('#cpExpire').value).getTime():null;let data={code:$('#cpCode').value.trim().toUpperCase(),type:$('#cpType').value,value:Number($('#cpValue').value||0),target:$('#cpTarget').value,maxUses:max,expiresAt:exp,active:$('#cpActive').checked,updatedAt:serverTimestamp()};let id=$('#cpId').value;if(id)await setDoc(doc(db,'coupons',id),data,{merge:true});else await addDoc(collection(db,'coupons'),{...data,usedCount:0,createdAt:serverTimestamp()});toast('Coupon saved')}
function ordersHtml(){return`<h1>Orders</h1><div class="grid">${orders.map(o=>`<div class="card"><h2>${o.type==='points'?(o.points+' Points'):(o.type==='product'?o.productTitle:(o.planName||'Order'))}</h2><p>${o.userEmail}</p><p>Amount: ${money(o.amount)} ${o.originalAmount?`<span class="muted">from ${money(o.originalAmount)}</span>`:''}</p><p>Coupon: ${o.couponCode||'None'}</p><p>Method: ${o.paymentMethod||''}</p><p>TX: ${o.txid||''}</p><p>Proof: ${o.proof||''}</p><p>Status: ${o.status}</p>${o.status==='pending'?`<button class="primary" onclick="approveOrder('${o.id}')">Approve</button><button class="danger" onclick="rejectOrder('${o.id}')">Reject</button>`:''}</div>`).join('')||'<p class="muted">No orders.</p>'}</div>`}
window.approveOrder=async id=>{let o=orders.find(x=>x.id===id);if(!o)return;if(o.type==='points'){await updateDoc(doc(db,'users',o.userId),{points:increment(Number(o.points||0))})}else if(o.type==='product'){/* delivery is saved inside order */}else{let p=plans.find(x=>x.id===o.planId)||{},days=Number(p.durationDays|| (o.planName==='Pro'?36500:o.planName==='Plus'?180:30));await updateDoc(doc(db,'users',o.userId),{plan:o.planName,planExpiry:Date.now()+days*864e5});if(o.referralCode){let qs=await getDocs(query(collection(db,'users'),where('referralCode','==',o.referralCode)));qs.forEach(async d=>{if(d.id!==o.userId){await updateDoc(doc(db,'users',d.id),{points:increment(Number(settings.referralPoints||20))});await addDoc(collection(db,'earnings'),{userId:d.id,amount:Number(o.amount||0)*0.2,source:'referral',createdAt:serverTimestamp()})}})}}if(o.couponCode){let qs=await getDocs(query(collection(db,'coupons'),where('code','==',o.couponCode)));qs.forEach(async d=>await updateDoc(doc(db,'coupons',d.id),{usedCount:increment(1)}))}await updateDoc(doc(db,'orders',id),{status:'approved',approvedAt:serverTimestamp()});toast('Approved')}
window.rejectOrder=async id=>{await updateDoc(doc(db,'orders',id),{status:'rejected'});toast('Rejected')}
function methodsHtml(){return`<h1>Methods</h1><div class="card form"><input id="mtitle" placeholder="Method title"><input id="mthumb" placeholder="Thumbnail image URL"><textarea id="mdesc" placeholder="Description"></textarea><input id="mvideo" placeholder="Video URL"><input id="mdoc" placeholder="Document URL"><input id="mdrive" placeholder="Google Drive link"><input id="mvip" placeholder="VIP group/channel post link"><input id="mfree" placeholder="Free group post link"><input id="mextra" placeholder="Extra link"><div class="row"><label><input type="checkbox" value="Free" class="lvl"> Free</label><label><input type="checkbox" value="Standard" class="lvl"> Standard</label><label><input type="checkbox" value="Plus" class="lvl"> Plus</label><label><input type="checkbox" value="Pro" class="lvl"> Pro</label></div><label><input id="allowPts" type="checkbox"> Can buy with Points</label><input id="mpts" type="number" placeholder="Point price for this method"><label><input id="mexp" type="checkbox"> Show expired tag</label><button class="primary" onclick="saveMethod()">Add Method</button></div><div class="methodGrid">${methods.map(m=>`<div class="card"><h2>${m.title}</h2><p>${(m.levels||[]).join(', ')}</p><p>${m.expired?'Expired':''} ${m.allowPoints?' • '+m.pointsPrice+' Points':''}</p><button class="danger" onclick="deleteDoc(doc(db,'methods','${m.id}'))">Delete</button></div>`).join('')}</div>`}
window.saveMethod=async()=>{let levels=$$('.lvl:checked').map(x=>x.value);if(!levels.length)levels=['Free'];await addDoc(collection(db,'methods'),{title:$('#mtitle').value,thumbnail:$('#mthumb').value,description:$('#mdesc').value,videoUrl:$('#mvideo').value,documentUrl:$('#mdoc').value,driveUrl:$('#mdrive').value,vipPostUrl:$('#mvip').value,freePostUrl:$('#mfree').value,extraUrl:$('#mextra').value,levels,allowPoints:$('#allowPts').checked,pointsPrice:Number($('#mpts').value||0),expired:$('#mexp').checked,createdAt:serverTimestamp()});toast('Method added')}

function productsHtml(){return`<h1>Products</h1><p class="muted">Add digital products. Users pay, admin approves, then delivery text/link is shown to the user.</p><div class="card form"><input id="prTitle" placeholder="Product title"><input id="prThumb" placeholder="Thumbnail image URL"><input id="prPrice" type="number" step="0.01" placeholder="Price"><input id="prDiscount" type="number" placeholder="Discount % optional"><input id="prBulkQty" type="number" placeholder="Bulk quantity e.g. 5"><input id="prBulkDiscount" type="number" placeholder="Bulk discount %"><textarea id="prDetails" placeholder="Product details"></textarea><textarea id="prDeliveryText" placeholder="Delivery text / account / code / instructions"></textarea><input id="prDeliveryLink" placeholder="Delivery link optional"><button class="primary" onclick="saveProduct()">Add Product</button></div><div class="grid">${products.map(p=>`<div class="card method"><div class="thumb">${p.thumbnail?`<img src="${p.thumbnail}" onerror="this.parentElement.innerHTML='🛍️'">`:'🛍️'}</div><div class="methodBody"><h2>${p.title}</h2><p>${money(p.price)} ${p.discount?`• ${p.discount}% off`:''}</p><p>${p.details||''}</p><p>${p.bulkQty?`Bulk: ${p.bulkQty}+ saves ${p.bulkDiscount||0}%`:''}</p><button class="danger" onclick="deleteDoc(doc(db,'products','${p.id}'))">Delete</button></div></div>`).join('')||'<p class="muted">No products yet.</p>'}</div>`}
window.saveProduct=async()=>{await addDoc(collection(db,'products'),{title:$('#prTitle').value,thumbnail:$('#prThumb').value,price:Number($('#prPrice').value||0),discount:Number($('#prDiscount').value||0),bulkQty:Number($('#prBulkQty').value||0),bulkDiscount:Number($('#prBulkDiscount').value||0),details:$('#prDetails').value,deliveryText:$('#prDeliveryText').value,deliveryLink:$('#prDeliveryLink').value,createdAt:serverTimestamp()});toast('Product added')}

function paymentsHtml(){return`<h1>Payment Methods</h1><div class="card form"><input id="pname" placeholder="Method name e.g. Binance USDT"><textarea id="paddr" placeholder="Payment ID / address / account"></textarea><button class="primary" onclick="addPayment()">Add Payment Method</button></div><div class="grid">${payments.map(p=>`<div class="card"><h2>${p.name}</h2><p>${p.address}</p><button class="danger" onclick="deleteDoc(doc(db,'paymentMethods','${p.id}'))">Delete</button></div>`).join('')}</div>`}
window.addPayment=async()=>{await addDoc(collection(db,'paymentMethods'),{name:$('#pname').value,address:$('#paddr').value,active:true,createdAt:serverTimestamp()});toast('Payment method added')}
function withdrawHtml(){return`<h1>Withdrawals</h1><div class="grid">${withdrawals.map(w=>`<div class="card"><h2>${money(w.amount)}</h2><p>${w.userEmail}</p><p>${w.method}</p><p>${w.account}</p><p>Status: ${w.status}</p>${w.status==='pending'?`<button class="primary" onclick="confirmWithdraw('${w.id}')">Confirm Payment</button><button class="danger" onclick="rejectWithdraw('${w.id}')">Reject</button>`:''}</div>`).join('')||'<p class="muted">No withdrawals.</p>'}</div>`}
window.confirmWithdraw=async id=>{await updateDoc(doc(db,'withdrawals',id),{status:'paid',paidAt:serverTimestamp()});toast('Withdraw marked paid')};window.rejectWithdraw=async id=>{await updateDoc(doc(db,'withdrawals',id),{status:'rejected'});toast('Rejected')}
function communityHtml(){return`<h1>Community Links</h1><div class="card form"><input id="cname" placeholder="Site / group name"><input id="curl" placeholder="URL"><textarea id="cdesc" placeholder="Description"></textarea><button class="primary" onclick="addCommunity()">Add Link</button></div><div class="grid">${community.map(c=>`<div class="card"><h2>${c.name}</h2><p>${c.url}</p><button class="danger" onclick="deleteDoc(doc(db,'community','${c.id}'))">Delete</button></div>`).join('')}</div>`}
window.addCommunity=async()=>{await addDoc(collection(db,'community'),{name:$('#cname').value,url:$('#curl').value,description:$('#cdesc').value,createdAt:serverTimestamp()});toast('Community added')}
function usersHtml(){return`<h1>Users</h1><div class="table"><table><tr><th>Name</th><th>Email</th><th>Plan</th><th>Points</th></tr>${users.map(u=>`<tr><td>${u.name||'User'}</td><td>${u.email}</td><td>${u.plan||'Basic'}</td><td>${u.points||0}</td></tr>`).join('')}</table></div>`}
function settingsHtml(){return`<h1>Settings</h1><div class="card form"><input id="rpts" type="number" value="${settings.referralPoints||20}" placeholder="Points per referral"><input id="ptprice" type="number" step="0.001" value="${settings.pointPrice||0.02}" placeholder="Price per point"><input id="support" value="${settings.supportUrl||''}" placeholder="Support URL or @username"><input id="vip" value="${settings.vipChannelLink||''}" placeholder="VIP channel link"><button class="primary" onclick="saveSettings()">Save Settings</button></div>`}
window.saveSettings=async()=>{await setDoc(doc(db,'settings','main'),{referralPoints:Number($('#rpts').value||20),pointPrice:Number($('#ptprice').value||0.02),supportUrl:$('#support').value,vipChannelLink:$('#vip').value},{merge:true});toast('Settings saved')}
onAuthStateChanged(auth,u=>{me=u;if(!u){redraw();return}onSnapshot(collection(db,'users'),s=>{users=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(collection(db,'orders'),s=>{orders=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(collection(db,'methods'),s=>{methods=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(collection(db,'products'),s=>{products=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(collection(db,'withdrawals'),s=>{withdrawals=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(collection(db,'community'),s=>{community=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(collection(db,'paymentMethods'),s=>{payments=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(collection(db,'plans'),s=>{plans=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(collection(db,'coupons'),s=>{coupons=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(doc(db,'settings','main'),s=>{settings={...settings,...(s.data()||{})};redraw()})});

</script><style>
